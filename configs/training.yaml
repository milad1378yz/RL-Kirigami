model_config:
  spatial_dims: 2
  in_channels: 1
  out_channels: 1
  latent_size: [32, 32]
  num_res_blocks: [2, 2, 3, 3]
  num_channels: [64, 128, 256, 320]
  attention_levels: [false, true, true, true]
  norm_num_groups: 32
  resblock_updown: true
  num_head_channels: [32, 64, 128, 160]
  transformer_num_layers: 8
  use_flash_attention: true
  dropout_cattn: 0.2
  max_timestep: 1000
  conditioning_embedding_num_channels: [16, 32, 96, 256]

data:
  generator_config: "configs/data_generator.yaml"
  pickle_path: "data_generator/kirigami_x_dataset.pkl"
  split_train: "train"
  split_val: "valid"

training:
  seed: 42
  num_epochs: 250
  batch_size: 32
  val_batch_size: 32
  lr: 2.0e-5
  weight_decay: 0.05
  warmup_epochs: 1
  min_lr_factor: 0.1
  max_steps: -1
  gradient_accumulation_steps: 1

  mixed_precision: "bf16"
  accelerator: "gpu"
  devices: "auto"
  allow_tf32: true
  channels_last: false
  compile: false
  compile_mode: "default"

  method: "euler"
  step_size: 0.125
  time_points: 9

  val_freq: 5
  num_val_samples: 4
  checkpoint_dir: "checkpoints"
  log_dir: "checkpoints/tb"
  swa: true
  swa_lr: 2.0e-6
  grad_clip_norm: 1.0
  deterministic: true
  log_every_n_steps: 50
  val_check_interval: null
  num_sanity_val_steps: 0
  ckpt_every_n_steps: 0

  num_workers: 4
  pin_memory: true
  augment_mask_p: 0.5
  augment_mask_rotate_deg: 180.0
  augment_mask_scale_min: 0.85
  augment_mask_scale_max: 1.15
  augment_mask_shift_frac_x: 0.125
  augment_mask_shift_frac_y: 0.125

  mask_threshold: 0.5
  metric_workers: 1

rl_training:
  num_epochs: 20
  batch_size: 8
  val_batch_size: 16
  lr: 1.0e-5
  max_steps: 300
  group_size: 4
  reward_temperature: 0.2
  adv_alpha: null
  weight_clip: 10.0
  ref_reg_weight: 0.02
  reward_metric: "siou"
  reward_transform: "logit"
  reward_power: 1.0
  reward_logit_eps: 1.0e-4
  reward_scale: 1.0
  reward_shift: 0.0
  reward_penalty_scale: 1.0
  reward_workers: 1
  val_metric_workers: 1
  shape_penalty:
    enabled: true
    build_fail: 5.0
    invalid_any: 2.0
    invalid_per_quad: 0.0
    overlap_ratio: 2.0
    overlap_ratio_threshold: 0.02
    fill_error: 2.0
    range_violation: 2.0
    clipped_fraction: 0.5
