model_config:
  spatial_dims: 2
  in_channels: 1
  out_channels: 1
  latent_size: [32, 32]
  num_res_blocks: [2, 2, 3, 3]
  num_channels: [64, 160, 320, 384]
  attention_levels: [false, true, true, true]
  norm_num_groups: 32
  resblock_updown: true
  num_head_channels: [32, 32, 64, 128]
  transformer_num_layers: 8
  use_flash_attention: true
  dropout_cattn: 0.2
  max_timestep: 1000
  conditioning_embedding_num_channels: [24, 48, 96]

data:
  generator_config: "configs/data_generator.yaml"
  split_train: "train"
  split_val: "valid"

fm_data:
  pickle_path: "data_generator/kirigami_x_dataset.pkl"

rl_data:
  pickle_path: "test/kirigami_x_test_folder_dataset.pkl"

distill_data:
  pickle_path: "test/kirigami_x_test_folder_dataset.pkl"

common_training:
  seed: 42
  mixed_precision: "bf16"
  accelerator: "gpu"
  devices: 1
  allow_tf32: true

  method: "euler"
  step_size: 0.125
  time_points: 9
  source_noise_std: 0.5

  checkpoint_dir: "checkpoints"
  grad_clip_norm: 1.0
  deterministic: true
  log_every_n_steps: 50
  num_val_samples: 10

  num_workers: 4
  pin_memory: true

  mask_threshold: 0.5

fm_training:
  num_epochs: 1000
  batch_size: 256
  val_batch_size: 256
  lr: 2.0e-5
  weight_decay: 0.05
  warmup_epochs: 1
  min_lr_factor: 0.1
  max_steps: -1
  gradient_accumulation_steps: 1
  val_freq: 20
  val_check_interval: null

  swa: true
  swa_lr: 2.0e-6
  augment_mask_p: 0.5
  augment_mask_rotate_deg: 180.0
  augment_mask_scale_min: 0.85
  augment_mask_scale_max: 1.15
  augment_mask_shift_frac_x: 0.125
  augment_mask_shift_frac_y: 0.125

rl_training:
  num_epochs: 300
  batch_size: 16
  val_batch_size: 32
  lr: 2.0e-5
  weight_decay: 0.0
  warmup_epochs: 0
  min_lr_factor: 1.0
  gradient_accumulation_steps: 1
  val_freq: 5.0

  swa: false
  augment_mask_p: 0.0
  augment_mask_rotate_deg: 0.0
  augment_mask_scale_min: 1.0
  augment_mask_scale_max: 1.0
  augment_mask_shift_frac_x: 0.0
  augment_mask_shift_frac_y: 0.0

  group_size: 8
  reward_temperature: 0.4
  adv_alpha: null
  weight_clip: 30.0
  ref_reg_weight: 0.0
  reward_metric: "siou"
  reward_transform: "none"
  reward_power: 1.0
  reward_logit_eps: 1.0e-4
  reward_scale: 1.0
  reward_shift: 0.0
  reward_penalty_scale: 1.0
  shape_penalty:
    enabled: false
    build_fail: 5.0
    invalid_any: 2.0
    invalid_per_quad: 0.0
    overlap_ratio: 2.0
    overlap_ratio_threshold: 0.02
    fill_error: 2.0
    range_violation: 2.0
    clipped_fraction: 0.5

distill_training:
  batch_size: 16
  val_batch_size: 32

  lr: 5.0e-6
  weight_decay: 0.0

  steps: 800
  eval_every: 25
  target_repeat: 4
  time_points_train: 9
  num_eval_draws: 10

  # No mask augmentation — targets are per-mask fixed.
  augment_mask_p: 0.0
  augment_mask_rotate_deg: 0.0
  augment_mask_scale_min: 1.0
  augment_mask_scale_max: 1.0
  augment_mask_shift_frac_x: 0.0
  augment_mask_shift_frac_y: 0.0

  # Stage 1 — rejection sampling to seed ES.
  n_candidates: 200

  # Stage 2 — (1+lambda) evolution strategy in z=log10(x) space, SIoU fitness.
  es_iters: 300
  es_pop_size: 40
  es_sigma_init: 0.15
  es_sigma_min: 0.01
